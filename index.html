<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platyx Hub</title>
  <style>
    :root {
      --bg: #05070b;
      --surface: #151b23;
      --card: #21262d;
      --card-hover: #27313c;
      --text: #f5f7fb;
      --muted: #a7b0bd;
      --accent: #28c7ff;
      --border: rgba(255, 255, 255, 0.1);
      --channel-img: url("https://i.postimg.cc/7hgNVhn5/c753d61e-1703-4588-9643-4527df2694a6.png");
      --hub-img: url("https://i.postimg.cc/sxKnp1Jw/3df8b850-7ed2-48f8-a57b-b3bf57d3b89c.png");
      --converter-img: url("https://i.postimg.cc/TY01BbQ6/photo-2026-06-03-19-26-56.jpg");
      --page-bg: url("https://i.postimg.cc/pdbDLzN5/7d4264ba-307e-44bf-9c87-f4fc0a3d2e3c.png");
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      position: relative;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -28px;
      background: var(--page-bg) center / cover no-repeat;
      opacity: 0.34;
      filter: blur(18px) saturate(1.12);
      transform: scale(1.08);
      animation: bgBlurIn 1800ms ease both;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 18%, rgba(40, 199, 255, 0.08), transparent 34%),
        linear-gradient(180deg, rgba(5, 7, 11, 0.48), rgba(5, 7, 11, 0.88) 58%, #05070b 100%);
      pointer-events: none;
      z-index: 1;
    }

    .page {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100vh;
      background: transparent;
      overflow: hidden;
      animation: pageReveal 700ms ease both;
    }

    .hero {
      position: relative;
      width: 100%;
      height: min(68vh, 700px);
      min-height: 430px;
      overflow: hidden;
      background: var(--bg);
      animation: heroReveal 900ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .hero img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center 62%;
      animation: imageFloatIn 1200ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(5, 7, 11, 0) 48%, rgba(5, 7, 11, 0.38) 76%, var(--bg) 100%),
        linear-gradient(to right, rgba(5, 7, 11, 0.26), transparent 18%, transparent 82%, rgba(5, 7, 11, 0.26));
      pointer-events: none;
    }

    .content {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: -18px auto 0;
      padding: 0 18px 32px;
      z-index: 2;
    }

    .divider {
      width: 100%;
      height: 2px;
      margin: 0 auto 24px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(40, 199, 255, 0.18) 10%,
        rgba(40, 199, 255, 1) 50%,
        rgba(40, 199, 255, 0.18) 90%,
        transparent 100%
      );
      box-shadow:
        0 0 18px rgba(40, 199, 255, 0.44),
        0 0 34px rgba(40, 199, 255, 0.18);
      opacity: 0.95;
      transform-origin: center;
      animation: dividerReveal 700ms ease 420ms both;
    }

    .button-divider {
      width: 56%;
      height: 1px;
      margin: 2px auto;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(40, 199, 255, 0.12) 12%,
        rgba(40, 199, 255, 0.7) 50%,
        rgba(40, 199, 255, 0.12) 88%,
        transparent 100%
      );
      box-shadow: 0 0 10px rgba(40, 199, 255, 0.18);
      opacity: 0.55;
      transform-origin: center;
      animation: dividerReveal 700ms ease both;
    }

    .buttons {
      display: grid;
      gap: 14px;
    }

    .button {
      position: relative;
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.012)), var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow:
        0 12px 26px rgba(0, 0, 0, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.045);
      opacity: 0;
      transform: translateY(18px) scale(0.98);
      animation: cardReveal 720ms cubic-bezier(0.16, 1, 0.3, 1) both;
      transition:
        transform 220ms ease,
        border-color 220ms ease,
        box-shadow 220ms ease,
        background-color 220ms ease;
    }

    .button:nth-of-type(1) {
      animation-delay: 620ms;
    }

    .button:nth-of-type(2) {
      animation-delay: 760ms;
    }

    .button:nth-of-type(3) {
      animation-delay: 900ms;
    }

    .profile-card,
    .app-card {
      justify-content: space-between;
      gap: 18px;
      text-align: left;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.035)),
        rgba(18, 24, 32, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow:
        0 20px 46px rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .profile-card {
      min-height: 96px;
      padding: 18px;
    }

    .app-card {
      min-height: 78px;
      padding: 12px 14px 12px 18px;
    }

    .profile-card::before,
    .app-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 0%, rgba(40, 199, 255, 0.13), transparent 34%),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent 44%);
      pointer-events: none;
      opacity: 0.9;
      z-index: 0;
      filter: none;
      transform: none;
      transition: none;
    }

    .app-card::after {
      content: none;
    }

    .profile-info {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .app-info {
      position: relative;
      z-index: 2;
      flex: 1;
      min-width: 0;
      display: grid;
      gap: 6px;
      text-align: left;
    }

    .app-topline {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      white-space: nowrap;
    }

    .app-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      font-size: 11.5px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.02em;
      text-transform: lowercase;
      color: rgba(255, 255, 255, 0.54);
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.08);
    }

    .app-status::before {
      content: "";
      width: 7px;
      height: 7px;
      flex: 0 0 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow:
        0 0 0 3px rgba(34, 197, 94, 0.12),
        0 0 12px rgba(34, 197, 94, 0.58);
    }

    .app-status::after {
      content: attr(data-status);
    }

    .app-status[data-status="Offline"]::before {
      background: #ef4444;
      box-shadow:
        0 0 0 3px rgba(239, 68, 68, 0.12),
        0 0 12px rgba(239, 68, 68, 0.58);
    }

    .app-status[data-status="Offline"] {
      color: rgba(255, 255, 255, 0.48);
    }

    .profile-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .profile-title {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.15;
      color: #ffffff;
    }

    .profile-subtitle {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.35;
      color: var(--muted);
    }

    .profile-badge,
    .app-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      border-radius: 999px;
      font-weight: 750;
      line-height: 1;
      color: #dff8ff;
      background: rgba(40, 199, 255, 0.12);
      border: 1px solid rgba(40, 199, 255, 0.24);
    }

    .profile-badge {
      min-height: 24px;
      padding: 4px 9px;
      font-size: 12px;
    }

    .app-badge {
      flex: 0 0 auto;
      min-height: 22px;
      padding: 4px 8px;
      font-size: 11.5px;
      letter-spacing: 0;
    }

    .profile-avatar,
    .app-icon {
      position: relative;
      z-index: 2;
      border-radius: 50%;
      overflow: hidden;
      background: #111820;
      border: 2px solid rgba(255, 255, 255, 0.9);
      box-shadow:
        0 0 0 1px rgba(40, 199, 255, 0.34),
        0 10px 24px rgba(0, 0, 0, 0.36);
    }

    .profile-avatar {
      width: 60px;
      height: 60px;
      flex: 0 0 60px;
      animation: avatarPop 650ms cubic-bezier(0.16, 1, 0.3, 1) 920ms both;
    }

    .app-icon {
      width: 50px;
      height: 50px;
      flex: 0 0 50px;
    }

    .profile-avatar img,
    .app-icon img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
    }

    .hub-card {
      --app-bg: var(--hub-img);
    }

    .converter-card {
      --app-bg: var(--converter-img);
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-2px);
      background-color: var(--card-hover);
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow:
        0 16px 34px rgba(0, 0, 0, 0.32),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
      outline: none;
    }

    .profile-card:hover,
    .profile-card:focus-visible,
    .app-card:hover,
    .app-card:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.23);
      box-shadow:
        0 24px 54px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.19);
    }

    .button:active,
    .profile-card:active,
    .app-card:active {
      transform: translateY(-1px);
    }

    @keyframes bgBlurIn {
      from {
        opacity: 0.2;
        filter: blur(0) saturate(1);
        transform: scale(1);
      }

      to {
        opacity: 0.34;
        filter: blur(18px) saturate(1.12);
        transform: scale(1.08);
      }
    }

    @keyframes pageReveal {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes heroReveal {
      from {
        opacity: 0;
        transform: translateY(-18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes imageFloatIn {
      from {
        opacity: 0;
        transform: scale(1.06);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes dividerReveal {
      from {
        opacity: 0;
        transform: scaleX(0.25);
      }

      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @keyframes cardReveal {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
        filter: blur(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes avatarPop {
      from {
        opacity: 0;
        transform: scale(0.82);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 520px) {
      .hero {
        height: 60vh;
        min-height: 390px;
      }

      .hero img {
        object-position: center 64%;
      }

      .content {
        margin-top: -14px;
        padding-inline: 14px;
        padding-bottom: 24px;
      }

      .divider {
        height: 2px;
        margin-bottom: 20px;
      }

      .button-divider {
        width: 50%;
      }

      .button {
        min-height: 58px;
        border-radius: 13px;
        font-size: 16px;
        padding: 16px 18px;
      }

      .profile-card {
        min-height: 92px;
        padding: 16px;
      }

      .app-card {
        min-height: 76px;
        padding: 12px 12px 12px 16px;
      }

      .profile-title {
        font-size: 19px;
      }

      .profile-avatar {
        width: 58px;
        height: 58px;
        flex-basis: 58px;
      }

      .app-icon {
        width: 50px;
        height: 50px;
        flex-basis: 50px;
      }
    }

    @media (max-width: 380px) {
      .hero {
        height: 58vh;
        min-height: 360px;
      }

      .hero img {
        object-position: center 66%;
      }

      .buttons {
        gap: 12px;
      }

      .profile-card {
        gap: 14px;
      }

      .app-card {
        min-height: 74px;
        gap: 12px;
      }

      .profile-avatar {
        width: 56px;
        height: 56px;
        flex-basis: 56px;
      }

      .app-icon {
        width: 48px;
        height: 48px;
        flex-basis: 48px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-delay: 0ms !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="Platyx Hub">
      <img src="https://i.postimg.cc/sxKnp1Jw/3df8b850-7ed2-48f8-a57b-b3bf57d3b89c.png" alt="Platyx Hub" />
    </section>

    <section class="content">
      <div class="divider" aria-hidden="true"></div>

      <nav class="buttons" aria-label="Platyx links">
        <a class="button profile-card" href="https://t.me/platyxchannel" target="_blank" rel="noopener noreferrer">
          <span class="profile-info">
            <span class="profile-meta">
              <span class="profile-title">Platyx</span>
              <span class="profile-badge">Channel</span>
            </span>
            <span class="profile-subtitle">Official channel</span>
          </span>
          <span class="profile-avatar" aria-hidden="true">
            <img src="https://i.postimg.cc/7hgNVhn5/c753d61e-1703-4588-9643-4527df2694a6.png" alt="" />
          </span>
        </a>

        <div class="button-divider" aria-hidden="true"></div>

        <a class="button app-card hub-card" href="https://t.me/PlatyxHub_bot" target="_blank" rel="noopener noreferrer">
          <span class="app-info">
            <span class="app-topline">
              <span class="app-title">Platyx Hub</span>
              <span class="app-badge">Bot</span>
            </span>
            <span class="app-status" data-status="Online"></span>
          </span>
          <span class="app-icon" aria-hidden="true">
            <img src="https://i.postimg.cc/4xS2065R/352a588c-1394-4c6a-ac54-cd0f6929f43e.png" alt="" />
          </span>
        </a>

        <div class="button-divider" aria-hidden="true"></div>

        <a class="button app-card converter-card" href="https://t.me/JustConvBot" target="_blank" rel="noopener noreferrer">
          <span class="app-info">
            <span class="app-topline">
              <span class="app-title">Just Converter</span>
              <span class="app-badge">Bot</span>
            </span>
            <span class="app-status" data-status="Online"></span>
          </span>
          <span class="app-icon" aria-hidden="true">
            <img src="https://i.postimg.cc/TY01BbQ6/photo-2026-06-03-19-26-56.jpg" alt="" />
          </span>
        </a>
      </nav>
    </section>
  </main>
</body>
</html>
