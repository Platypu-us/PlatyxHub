<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platyx Hub</title>
  <style>
    :root {
      --bg: #05070b;
      --card: #21262d;
      --card-hover: #27313c;
      --text: #f5f7fb;
      --accent: #28c7ff;
      --accent-glow: rgba(40, 199, 255, 0.42);
      --border: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: min(62vh, 640px);
      min-height: 360px;
      overflow: hidden;
      background: var(--bg);
    }

    .hero img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center top;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(5, 7, 11, 0) 42%, rgba(5, 7, 11, 0.55) 74%, var(--bg) 100%),
        linear-gradient(to right, rgba(5, 7, 11, 0.34), transparent 18%, transparent 82%, rgba(5, 7, 11, 0.34));
      pointer-events: none;
    }

    .content {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: -24px auto 0;
      padding: 0 18px 32px;
      z-index: 2;
    }

    .divider {
      width: 100%;
      height: 1px;
      margin: 0 0 24px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(40, 199, 255, 0.12) 14%,
        rgba(40, 199, 255, 0.95) 50%,
        rgba(40, 199, 255, 0.12) 86%,
        transparent 100%
      );
      box-shadow: 0 0 18px rgba(40, 199, 255, 0.36);
    }

    .buttons {
      display: grid;
      gap: 14px;
    }

    .button {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      font-size: 17px;
      font-weight: 750;
      letter-spacing: 0.02em;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.012)), var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow:
        0 14px 32px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition:
        transform 220ms ease,
        border-color 220ms ease,
        box-shadow 220ms ease,
        background-color 220ms ease,
        color 220ms ease;
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-4px);
      color: #ffffff;
      background-color: var(--card-hover);
      border-color: rgba(40, 199, 255, 0.92);
      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.36),
        0 0 26px var(--accent-glow),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      outline: none;
    }

    .button:active {
      transform: translateY(-1px);
    }

    @media (max-width: 520px) {
      .hero {
        height: 54vh;
        min-height: 320px;
      }

      .hero img {
        object-position: center top;
      }

      .content {
        margin-top: -18px;
        padding-inline: 14px;
        padding-bottom: 24px;
      }

      .divider {
        margin-bottom: 20px;
      }

      .button {
        min-height: 58px;
        border-radius: 13px;
        font-size: 16px;
        padding: 16px 18px;
      }
    }

    @media (max-width: 380px) {
      .hero {
        height: 50vh;
        min-height: 290px;
      }

      .buttons {
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="Platyx Hub">
      <img src="https://i.postimg.cc/sxKnp1Jw/3df8b850-7ed2-48f8-a57b-b3bf57d3b89c.png" />
    </section>

    <section class="content">
      <div class="divider" aria-hidden="true"></div>

      <nav class="buttons" aria-label="Platyx links">
        <a class="button" href="https://t.me/platyxchannel" target="_blank" rel="noopener noreferrer">Channel Platyx</a>
        <a class="button" href="https://t.me/PlatyxHub_bot" target="_blank" rel="noopener noreferrer">Platyx Hub</a>
        <a class="button" href="https://t.me/JustConvBot" target="_blank" rel="noopener noreferrer">Just Converter</a>
      </nav>
    </section>
  </main>
</body>
</html>
